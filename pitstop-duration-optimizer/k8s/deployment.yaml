apiVersion: apps/v1
kind: Deployment
metadata:
  name: pitstop-duration-optimizer
  labels:
    app: pitstop-duration-optimizer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pitstop-duration-optimizer
  template:
    metadata:
      labels:
        app: pitstop-duration-optimizer
    spec:
      containers:
        - name: pitstop-duration-optimizer
          image: <+artifact.image>
          ports:
            - containerPort: 7001
          readinessProbe:
            httpGet:
              path: /health
              port: 7001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 7001
            initialDelaySeconds: 5
            periodSeconds: 10
