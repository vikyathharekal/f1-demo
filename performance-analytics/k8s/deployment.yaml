apiVersion: apps/v1
kind: Deployment
metadata:
  name: performance-analytics
  labels:
    app: performance-analytics
    team: f1-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: performance-analytics
  template:
    metadata:
      labels:
        app: performance-analytics
        team: f1-demo
    spec:
      containers:
        - name: performance-analytics
          image: {{.Values.image}}
          ports:
            - containerPort: 7003
          env:
            - name: PITSTOP_SERVICE_URL
              value: "http://pitstop-duration-optimizer:7001"
            - name: DRIVER_SERVICE_URL
              value: "http://driver-analytics:7002"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 7003
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 7003
            initialDelaySeconds: 5
            periodSeconds: 10
